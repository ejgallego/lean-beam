name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  macos-stderr-lake-repro:
    name: macos-stderr-lake-repro
    runs-on: macos-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/lean-ci-setup

      - name: Build reducer
        run: lake build RunAt:shared beam-stderr-lake-repro beam-daemon beam-daemon-smoke-test

      - name: Run standalone stderr/Lake reducer
        shell: bash
        run: |
          set -euo pipefail

          dump_hang_state() {
            local label="$1"
            local pattern="$2"
            local root_pid="${3:-}"
            local tmpdir="${RUNNER_TEMP:-/tmp}"
            local pid_file="${tmpdir}/beam-hang-pids-${label}.txt"

            echo "::group::${label}: process state"
            ps -axo pid,ppid,state,command | grep -E "${pattern}" | grep -v grep || true
            echo "::endgroup::"

            if [[ "$(uname -s)" != "Darwin" ]] || ! command -v sample >/dev/null 2>&1; then
              return 0
            fi

            {
              if [[ -n "${root_pid}" ]]; then
                echo "${root_pid}"
              fi
              ps -axo pid=,command= | awk -v pat="${pattern}" '$0 ~ pat && $0 !~ /awk/ { print $1 }'
            } | sort -nu > "${pid_file}"

            echo "::group::${label}: macOS stack samples"
            while IFS= read -r pid; do
              if [[ -z "${pid}" ]]; then
                continue
              fi
              echo "--- sample pid=${pid} ---"
              local sample_file="${tmpdir}/beam-sample-${label}-${pid}.txt"
              sample "${pid}" 3 -file "${sample_file}" || true
              if [[ -f "${sample_file}" ]]; then
                sed -n '1,260p' "${sample_file}"
              fi
            done < "${pid_file}"
            echo "::endgroup::"
          }

          run_case() {
            local kind="$1"
            echo "::group::stderr/Lake reducer: ${kind}"
            .lake/build/bin/beam-stderr-lake-repro "$kind" &
            local reducer_pid="$!"
            (
              sleep 45
              echo "::error::stderr/Lake reducer '${kind}' exceeded 45s; dumping process state"
              dump_hang_state \
                "stderr-lake-${kind}" \
                'beam-stderr-lake-repro|lean --server|sleep 120' \
                "${reducer_pid}"
              kill -TERM "$reducer_pid" 2>/dev/null || true
              sleep 5
              kill -KILL "$reducer_pid" 2>/dev/null || true
            ) &
            local watchdog_pid="$!"
            set +e
            wait "$reducer_pid"
            local status="$?"
            set -e
            kill "$watchdog_pid" 2>/dev/null || true
            wait "$watchdog_pid" 2>/dev/null || true
            echo "::endgroup::"
            return "$status"
          }

          run_case sleep
          run_case sleep-task
          run_case sleep-dual-dedicated-task
          run_case lean-session-dedicated-task
          run_case sleep-dual-task
          run_case lean-server
          run_case lean-server-task
          run_case lean-server-dual-task
          run_case lean-session
          run_case lean-session-no-readers-task
          run_case lean-session-no-stderr-task
          run_case lean-session-no-stdout-task
          run_case lean-open
          run_case lean-session-task
          run_case lean-open-no-stderr-task
          run_case lean-open-no-stdout-task
          run_case lean-open-task
          run_case lean-plugin-open
          run_case lean-plugin-open-task
          BEAM_DEBUG_SAVE_DUMMY_DRAIN=1 run_case broker-direct
          BEAM_DEBUG_SAVE_DUMMY_DRAIN=1 run_case broker-direct-task

      - name: Run broker save reducer
        shell: bash
        run: |
          set -euo pipefail

          dump_hang_state() {
            local label="$1"
            local pattern="$2"
            local root_pid="${3:-}"
            local tmpdir="${RUNNER_TEMP:-/tmp}"
            local pid_file="${tmpdir}/beam-hang-pids-${label}.txt"

            echo "::group::${label}: process state"
            ps -axo pid,ppid,state,command | grep -E "${pattern}" | grep -v grep || true
            echo "::endgroup::"

            if [[ "$(uname -s)" != "Darwin" ]] || ! command -v sample >/dev/null 2>&1; then
              return 0
            fi

            {
              if [[ -n "${root_pid}" ]]; then
                echo "${root_pid}"
              fi
              ps -axo pid=,command= | awk -v pat="${pattern}" '$0 ~ pat && $0 !~ /awk/ { print $1 }'
            } | sort -nu > "${pid_file}"

            echo "::group::${label}: macOS stack samples"
            while IFS= read -r pid; do
              if [[ -z "${pid}" ]]; then
                continue
              fi
              echo "--- sample pid=${pid} ---"
              local sample_file="${tmpdir}/beam-sample-${label}-${pid}.txt"
              sample "${pid}" 3 -file "${sample_file}" || true
              if [[ -f "${sample_file}" ]]; then
                sed -n '1,260p' "${sample_file}"
              fi
            done < "${pid_file}"
            echo "::endgroup::"
          }

          run_broker_case() {
            local name="$1"
            shift
            echo "::group::broker save reducer: ${name}"
            env BEAM_DEBUG_SAVE_ONLY=1 "$@" .lake/build/bin/beam-daemon-smoke-test &
            local reducer_pid="$!"
            (
              sleep 45
              echo "::error::broker save reducer '${name}' exceeded 45s; dumping process state"
              dump_hang_state \
                "broker-save-${name}" \
                'beam-daemon|beam-daemon-smoke-test|lean --server|sleep 120' \
                "${reducer_pid}"
              kill -TERM "$reducer_pid" 2>/dev/null || true
              sleep 5
              kill -KILL "$reducer_pid" 2>/dev/null || true
            ) &
            local watchdog_pid="$!"
            set +e
            wait "$reducer_pid"
            local status="$?"
            set -e
            kill "$watchdog_pid" 2>/dev/null || true
            wait "$watchdog_pid" 2>/dev/null || true
            echo "::endgroup::"
            return "$status"
          }

          run_broker_case control
          run_broker_case dummy-drain BEAM_DEBUG_SAVE_DUMMY_DRAIN=1
